    <meta charset="UTF-8">

<body>

    <div class="header">
        <h1>KEDAI BARANG ANTIK</h1>

            <a href="index.html">HOME</a>
            <a href="butiran.html">MAKLUMAT BUTIRAN</a>
            <a href="hubungi.html" class="active">HUBUNGI KAMI</a>
        </div>
    </div>

    <div class="container">
        <h2>HUBUNGI KAMI</h2>
        
        <form class="borang">
            <div class="input-group">
                <label for="nama">Nama Penuh:</label>
                <input type="text" id="nama" placeholder="Masukkan nama anda">
            </div>

            <div class="input-group">
                <label for="email">E-mel:</label>
                <input type="email" id="email" placeholder="Masukkan e-mel anda">
            </div>

            <div class="input-group">
                <label for="mesej">Mesej / Pertanyaan:</label>
                <textarea id="mesej" rows="5" placeholder="Tulis mesej anda di sini..."></textarea>
            </div>

            <button type="submit" class="btn-hantar">Hantar Mesej</button>
        </form>
    </div>

    <div class="footer">
        Hakcipta Terpelihara &copy; 2026 Kedai Barang Antik Premium
    </div>
